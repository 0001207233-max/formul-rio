 <form action="#" method="POST">
        <h2>Ficha de Cadastro Escolar</h2>

        <!-- SEÇÃO: DADOS PESSOAIS -->
        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <div class="campo">
                <label for="nome_aluno">Nome do Aluno:</label>
                <input type="text" id="nome_aluno" name="nome_aluno" required>
            </div>

            <div class="campo">
                <label for="nome_mae">Nome da Mãe:</label>
                <input type="text" id="nome_mae" name="nome_mae" required>
            </div>

            <div class="campo">
                <label for="nome_pai">Nome do Pai:</label>
                <input type="text" id="nome_pai" name="nome_pai">
            </div>

            <div class="campo">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
            </div>

            <div class="campo">
                <label for="rg">RG:</label>
                <input type="text" id="rg" name="rg">
            </div>

            <div class="campo">
                <label for="data_nascimento">Data de Nascimento:</label>
                <input type="date" id="data_nascimento" name="data_nascimento" required>
            </div>
        </fieldset>

        <!-- SEÇÃO: ENDEREÇO -->
        <fieldset>
            <legend>Endereço</legend>

            <div class="campo">
                <label for="endereco">Endereço (Rua, Número, Comp.):</label>
                <textarea id="endereco" name="endereco" required></textarea>
            </div>

            <div class="campo">
                <label for="bairro">Bairro:</label>
                <input type="text" id="bairro" name="bairro" required>
            </div>

            <div class="campo">
                <label for="cep">CEP:</label>
                <input type="text" id="cep" name="cep" placeholder="00000-000" required>
            </div>

            <div class="campo">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" required>
            </div>

            <div class="campo">
                <label for="estado">Estado:</label>
                <select id="estado" name="estado" required>
                    <option value="">Selecione...</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
            </div>
        </fieldset>

        <!-- SEÇÃO: INFORMAÇÕES ESCOLARES -->
        <fieldset>
            <legend>Informações Escolares</legend>

            <div class="campo">
                <label for="serie">Série:</label>
                <select id="serie" name="serie" required>
                    <option value="">Selecione a série...</option>
                    <option value="1_ano_fi">1º Ano - Ensino Fundamental I</option>
                    <option value="2_ano_fi">2º Ano - Ensino Fundamental I</option>
                    <option value="3_ano_fi">3º Ano - Ensino Fundamental I</option>
                    <option value="4_ano_fi">4º Ano - Ensino Fundamental I</option>
                    <option value="5_ano_fi">5º Ano - Ensino Fundamental I</option>
                    <option value="6_ano_fii">6º Ano - Ensino Fundamental II</option>
                    <option value="7_ano_fii">7º Ano - Ensino Fundamental II</option>
                    <option value="8_ano_fii">8º Ano - Ensino Fundamental II</option>
                    <option value="9_ano_fii">9º Ano - Ensino Fundamental II</option>
                    <option value="1_ano_em">1º Ano - Ensino Médio</option>
                    <option value="2_ano_em">2º Ano - Ensino Médio</option>
                    <option value="3_ano_em">3º Ano - Ensino Médio</option>
                </select>
            </div>

            <div class="campo">
                <label for="turno">Turno:</label>
                <select id="turno" name="turno" required>
                    <option value="">Selecione o turno...</option>
                    <option value="manha">Matutino (Manhã)</option>
                    <option value="tarde">Vespertino (Tarde)</option>
                    <option value="noite">Noturno (Noite)</option>
                </select>
            </div>
        </fieldset>

        <button type="submit">Cadastrar Aluno</button>
    </form>
